<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>K_DOCS Viewer</title>

  <style>
    /* ===== 4-theme system (from production) ===== */
    :root {
      --bg: #faf6f1; --fg: #1a1a2e; --accent: #0055b3; --muted: #5c5c78;
      --border: #d48a3c; --code-bg: #eee8df; --col-alt: rgba(0, 85, 179, 0.05);
      --max-width: 860px;
    }
    @media (prefers-color-scheme: dark) {
      html:not([data-theme]), html[data-theme="auto"] {
        --bg: #1a1a2e; --fg: #e8e4f0; --accent: #5599dd; --muted: #9494aa;
        --border: #cc8833; --code-bg: #28283e; --col-alt: rgba(85, 153, 221, 0.07);
      }
    }
    html[data-theme="cayman"] {
      --bg: #eff6ff; --fg: #0f172a; --accent: #1d4ed8; --muted: #475569;
      --border: #93c5fd; --code-bg: #dbeafe; --col-alt: rgba(29, 78, 216, 0.05);
    }
    html[data-theme="midnight"] {
      --bg: #0f172a; --fg: #e2e8f0; --accent: #60a5fa; --muted: #94a3b8;
      --border: #334155; --code-bg: #1e293b; --col-alt: rgba(96, 165, 250, 0.07);
    }
    html[data-theme="daltonism-light"] {
      --bg: #faf6f1; --fg: #1a1a2e; --accent: #0055b3; --muted: #5c5c78;
      --border: #d48a3c; --code-bg: #eee8df; --col-alt: rgba(0, 85, 179, 0.05);
    }
    html[data-theme="daltonism-dark"] {
      --bg: #1a1a2e; --fg: #e8e4f0; --accent: #5599dd; --muted: #9494aa;
      --border: #cc8833; --code-bg: #28283e; --col-alt: rgba(85, 153, 221, 0.07);
    }

    /* ===== Base styles ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--fg); line-height: 1.7; padding: 0;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1rem 3.5rem; }
    body.landscape .container { max-width: 100%; }

    /* ===== Discrete thin scrollbars ===== */
    *, *::before, *::after { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ===== Typography ===== */
    h1 { font-size: 2rem; margin: 1.5rem 0 0.5rem; color: var(--accent); }
    h2 { font-size: 1.5rem; margin-top: 2.5rem; margin-bottom: 1rem; padding-bottom: 0.3rem; border-bottom: 2px solid var(--border); }
    h3 { font-size: 1.2rem; margin-top: 1.8rem; margin-bottom: 0.6rem; color: var(--accent); }
    h4 { font-size: 1rem; margin-top: 1.2rem; margin-bottom: 0.4rem; }
    p { margin-bottom: 1rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    strong { font-weight: 600; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ===== Code ===== */
    code {
      background: var(--code-bg); padding: 0.15em 0.4em; border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.85em;
    }
    pre {
      background: var(--code-bg); padding: 1rem; border-radius: 6px;
      overflow-x: auto; margin: 1rem 0; line-height: 1.45;
    }
    pre code { background: none; padding: 0; font-size: 0.85em; }

    /* ===== Tables ===== */
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.88rem; line-height: 1.5; }
    th, td { padding: 0.45rem 0.7rem; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: var(--code-bg); font-weight: 600; border-bottom: 2px solid var(--accent); white-space: nowrap; }
    tr:nth-child(even) td { background: var(--col-alt); }
    td code { font-size: 0.82rem; padding: 0.1em 0.3em; }
    .table-wrap { overflow-x: auto; margin: 1rem 0; }

    /* ===== Blockquotes ===== */
    blockquote {
      border-left: 4px solid var(--border); padding: 0.5rem 1rem; margin: 1rem 0;
      color: var(--muted); background: var(--col-alt); border-radius: 0 4px 4px 0;
    }
    blockquote p { margin-bottom: 0.5rem; }
    blockquote p:last-child { margin-bottom: 0; }

    /* ===== Lists ===== */
    ul, ol { margin: 0.5rem 0 1rem 1.5rem; }
    li { margin-bottom: 0.3rem; }

    /* ===== Images ===== */
    img { max-width: 100%; height: auto; border-radius: 4px; }

    /* ===== Mermaid ===== */
    .mermaid { text-align: center; margin: 1.5rem 0; }
    .mermaid svg { max-width: 100%; height: auto; }
    .mermaid-source { display: none !important; }

    /* ===== Feature grid (from production) ===== */
    .feature-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem; margin: 1.5rem 0;
    }
    .feature-card {
      background: var(--code-bg); border-radius: 8px; padding: 1.2rem;
      border: 1px solid var(--border); transition: transform 0.2s;
    }
    .feature-card:hover { transform: translateY(-2px); }
    .feature-card h4 { margin-top: 0; color: var(--accent); font-size: 0.95rem; }
    .feature-card p { margin-bottom: 0; font-size: 0.88rem; color: var(--muted); }

    /* ===== Badges (from production) ===== */
    .badge {
      display: inline-block; padding: 0.15em 0.5em; border-radius: 3px;
      font-size: 0.75em; font-weight: 600; vertical-align: middle;
    }
    .badge-new { background: #dcfce7; color: #166534; }
    .badge-v1 { background: #e0e7ff; color: #3730a3; }
    .badge-legacy { background: #fef3c7; color: #92400e; }
    html[data-theme="midnight"] .badge-new,
    html[data-theme="daltonism-dark"] .badge-new { background: #064e3b; color: #6ee7b7; }
    html[data-theme="midnight"] .badge-v1,
    html[data-theme="daltonism-dark"] .badge-v1 { background: #312e81; color: #a5b4fc; }
    html[data-theme="midnight"] .badge-legacy,
    html[data-theme="daltonism-dark"] .badge-legacy { background: #78350f; color: #fcd34d; }

    /* ===== Comparison table (from production) ===== */
    .comparison-table .v1 { color: var(--muted); }
    .comparison-table .v2 { color: var(--accent); font-weight: 500; }

    /* ===== Annex section ===== */
    .annex-section {
      border-top: 3px solid var(--border); margin-top: 3rem; padding-top: 1.5rem;
      opacity: 0.85;
    }

    /* ===== Document Header ===== */
    .doc-header {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
      margin: 1.5rem 0; overflow: hidden;
    }
    .doc-header-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.4rem 1rem; border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .doc-header-bar a { color: var(--accent); text-decoration: none; white-space: nowrap; }
    .doc-header-bar a:hover { text-decoration: underline; }
    .doc-header-bar .dh-nav { flex-shrink: 0; }
    .doc-header-bar .dh-actual { flex-shrink: 0; }
    .doc-header-bar .dh-version {
      flex-shrink: 0; color: var(--muted); font-size: 0.76rem;
    }
    .doc-header-bar .version-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #28a745; margin-right: 0.3rem; vertical-align: middle;
    }
    .doc-header-toggle {
      cursor: pointer; color: var(--muted); padding: 0 0.5rem;
      font-size: 0.7rem; flex-shrink: 0; user-select: none;
      border-right: 1px solid var(--border); margin-right: 0.5rem;
    }
    .doc-header-toggle:hover { color: var(--accent); }
    .doc-header-details {
      padding: 0.8rem 1rem; font-size: 0.82rem; color: var(--muted); line-height: 1.8;
    }
    .doc-header-details span { display: inline-block; margin-right: 1.5rem; }
    .doc-header-title { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; line-height: 1.3; }
    .doc-header-tagline { font-size: 0.92rem; color: var(--muted); margin-bottom: 0.8rem; font-style: italic; line-height: 1.5; }
    .doc-header-meta { font-size: 0.82rem; color: var(--muted); line-height: 1.8; }
    .doc-header-meta span { display: inline-block; margin-right: 1.5rem; }
    .doc-header-badge {
      display: inline-block; background: var(--accent); color: white;
      padding: 0.1em 0.5em; border-radius: 3px; font-size: 0.75em; font-weight: 600;
      vertical-align: middle; margin-left: 0.4rem;
    }
    .doc-header-rule { border: none; border-top: 1px solid var(--border); margin: 0.6rem 0; }
    .doc-header-gen { font-size: 0.75rem; color: var(--muted); font-family: monospace; margin-top: 0.3rem; }
    .doc-header-id { font-size: 0.78rem; color: var(--muted); font-weight: 600; margin-bottom: 0.2rem; }
    .doc-header-citation { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-top: 0.4rem; border-top: 1px solid var(--border); padding-top: 0.4rem; }

    /* ===== Embed bar (standalone link) ===== */
    .embed-topbar {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0.2rem 0.5rem; font-size: 0.72rem; background: var(--code-bg);
      border-bottom: 1px solid var(--border);
    }
    .embed-topbar a {
      color: var(--accent); text-decoration: none; opacity: 0.7;
    }
    .embed-topbar a:hover { opacity: 1; text-decoration: underline; }

    /* ===== TOC ===== */
    .toc {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.5rem; margin: 1.5rem 0;
    }
    .toc-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--accent); }
    .toc ul { list-style: none; margin: 0; padding: 0; }
    .toc.toc-twocol ul { columns: 2; column-gap: 2rem; }
    .toc li { margin: 0.25rem 0; break-inside: avoid; }
    .toc li.toc-h3 { padding-left: 1.2rem; }
    .toc a { color: var(--fg); font-size: 0.88rem; }
    .toc a:hover { color: var(--accent); }

    /* ===== Chrome bar (shared convention for all panels) ===== */
    .chrome-bar {
      background: var(--code-bg); border-bottom: 1px solid var(--border);
      font-size: 0.78rem; user-select: none;
      display: flex; align-items: stretch;
    }
    body.embed-mode .container { padding: 0; max-width: 100%; }
    body.embed-mode #content > *:not(.chrome-bar):not(.chrome-bar-meta) { margin-left: 1rem; margin-right: 1rem; }
    body.embed-mode #content { padding-bottom: 1rem; }
    .chrome-bar-fixed {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.2rem 0.75rem; flex: 1; min-width: 0;
    }
    .chrome-bar-fixed a {
      color: var(--accent); text-decoration: none; font-size: 0.76rem; white-space: nowrap;
    }
    .chrome-bar-fixed a:hover { text-decoration: underline; }
    .chrome-bar-nav { flex-shrink: 0; }
    .chrome-bar-actual { flex-shrink: 0; }
    .chrome-bar-version {
      flex-shrink: 0; font-size: 0.72rem; color: var(--muted); white-space: nowrap;
    }
    .chrome-bar-version .version-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #28a745; margin-right: 0.3rem; vertical-align: middle;
    }
    .chrome-bar-toggle {
      cursor: pointer; color: var(--muted); padding: 0.2rem 0.5rem;
      display: flex; align-items: center; font-size: 0.7rem;
      border-right: 1px solid var(--border); flex-shrink: 0;
    }
    .chrome-bar-toggle:hover { background: var(--col-alt); color: var(--accent); }
    .chrome-bar-meta {
      padding: 0.4rem 0.75rem; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted); line-height: 1.6;
    }
    .chrome-bar-meta .chrome-title { font-weight: 700; font-size: 0.82rem; color: var(--fg); }
    .chrome-bar-meta .chrome-badge {
      display: inline-block; background: var(--accent); color: white;
      padding: 0.05em 0.4em; border-radius: 3px; font-size: 0.7em; font-weight: 600;
      vertical-align: middle; margin-left: 0.3rem;
    }
    .chrome-bar-meta .chrome-tagline { font-style: italic; }
    .chrome-bar-meta .chrome-gen { font-family: monospace; font-size: 0.72rem; }
    .chrome-bar-meta .chrome-citation { font-style: italic; border-top: 1px solid var(--border); padding-top: 0.3rem; margin-top: 0.3rem; }
    .chrome-bar-meta span { display: inline-block; margin-right: 1rem; }
    .chrome-detail-row { line-height: 1.7; }
    .chrome-detail-label { display: inline-block; min-width: 5.5rem; font-weight: 600; color: var(--fg); }
    .doc-header-details .chrome-detail-row { line-height: 1.7; }
    .doc-header-details .chrome-detail-label { display: inline-block; min-width: 5.5rem; font-weight: 600; color: var(--fg); }
    #ifaceFrame {
      width: calc(100% - 1rem); border: none; background: var(--bg);
      flex: 1; min-height: 0; margin: 0.25rem 0.5rem;
    }
    /* When in interface mode, content fills remaining viewport as flex column */
    #content[data-interface-mode="1"] {
      display: flex !important; flex-direction: column !important;
      height: calc(100vh - 5.5rem) !important; overflow: hidden !important;
    }

    /* ===== Toolbar (shared) ===== */
    .toolbar {
      position: sticky; z-index: 100; background: var(--bg);
      padding: 0.5rem 1rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      justify-content: space-between;
      max-width: var(--max-width); margin: 0 auto;
    }
    body.landscape .toolbar, body.interface-mode .toolbar { max-width: 100%; }
    .toolbar-top { top: 0; border-bottom: 1px solid var(--border); }
    .toolbar-bottom { bottom: 0; border-top: 1px solid var(--border); }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .toolbar label { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .toolbar select {
      background: var(--code-bg); color: var(--fg); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.82rem; cursor: pointer;
    }
    .toolbar select:hover { border-color: var(--accent); }
    .toolbar select option { background: var(--bg); color: var(--fg); }
    .toolbar-btn {
      background: var(--accent); color: white; border: none; border-radius: 4px;
      padding: 0.35rem 0.8rem; font-size: 0.82rem; cursor: pointer; font-weight: 500;
    }
    .toolbar-btn:hover { opacity: 0.85; }
    .toolbar-btn:disabled { opacity: 0.5; cursor: wait; }
    .toolbar-radio { display: flex; align-items: center; gap: 0.3rem; font-size: 0.82rem; color: var(--muted); cursor: pointer; }
    .toolbar-radio input[type="radio"] { accent-color: var(--accent); cursor: pointer; }

    /* ===== Language switch ===== */
    .lang-switch { display: flex; gap: 0; }
    .lang-btn {
      background: var(--code-bg); color: var(--muted); border: 1px solid var(--border);
      padding: 0.35rem 0.6rem; font-size: 0.82rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.05em; transition: background 0.2s, color 0.2s;
    }
    .lang-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
    .lang-btn:last-child { border-radius: 0 4px 4px 0; }
    .lang-btn.lang-active { background: var(--accent); color: white; border-color: var(--accent); }
    .lang-btn.lang-disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== Document selector ===== */
    .doc-selector select { min-width: 280px; max-width: 400px; }

    /* ===== Meta header ===== */
    .pub-meta {
      font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem;
      border-left: 3px solid var(--accent); padding-left: 0.8rem;
    }
    .pub-meta p { margin-bottom: 0.2rem; }

    /* ===== Loading ===== */
    .loading { text-align: center; padding: 3rem; color: var(--muted); }
    .loading::after {
      content: ''; display: block; width: 32px; height: 32px;
      margin: 1rem auto; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Webcard header (first element before doc-header) ===== */
    .webcard-header {
      width: 100%; max-width: var(--max-width); margin: 1rem auto 0;
      border-radius: 8px 8px 0 0; overflow: hidden;
      border: 1px solid var(--border); border-bottom: none;
    }
    body.landscape .webcard-header { max-width: 100%; }
    .webcard-header img {
      width: 100%; height: auto; display: block;
    }
    /* When webcard sits above doc-header, flatten the join */
    .webcard-header + .doc-header {
      border-radius: 0 0 8px 8px; margin-top: 0;
    }
    .webcard-header.webcard-hidden { display: none !important; }
    @media print { .webcard-header { display: none !important; } }

    /* ===== Cover page (hidden on screen, shown in print) ===== */
    #pub-cover-page { display: none; }

    /* ===== Toast notification ===== */
    .copy-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: white; padding: 0.6rem 1.2rem;
      border-radius: 6px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s;
      z-index: 9999; pointer-events: none;
    }
    .copy-toast.show { opacity: 1; }

    /* ===== Page size dim ===== */
    .pub-size-dim { font-size: 0.72rem; color: var(--muted); }

    /* ===== Print / PDF export — Three-Zone Layout (from production) ===== */
    @media print {
      /* Hide non-content elements */
      .toolbar, .toolbar-bottom, .doc-header, .chrome-bar, .chrome-bar-meta, .copy-toast { display: none !important; }
      body { padding: 0; }
      .container { max-width: 100%; padding: 0; }

      /* Three-zone @page: header liner + content + footer liner */
      @page {
        size: letter;
        margin: 1.8cm 1.5cm 1.8cm 1.5cm;
        padding: 0.4cm 0; /* liner-to-content gap */
      }
      /* Running header — single-box liner (Chrome double-liner fix) */
      @page {
        @top-left {
          content: ""; /* overridden by printAs() */
          width: 100%;
          font-size: 7.5pt; color: #888;
          vertical-align: bottom;
          padding-bottom: 0.3cm;
          border-bottom: 2pt solid #1d4ed8;
        }
        @top-center { content: ""; width: 0; }
        @top-right  { content: ""; width: 0; }
      }
      /* Three-column footer with liner */
      @page {
        @bottom-left {
          content: ""; /* overridden by printAs() */
          font-size: 7.5pt; color: #888;
          padding-top: 0.3cm;
          border-top: 2pt solid #1d4ed8;
        }
        @bottom-center {
          content: counter(page) " / " counter(pages);
          font-size: 7.5pt; color: #888;
          padding-top: 0.3cm;
          border-top: 2pt solid #1d4ed8;
        }
        @bottom-right {
          content: "K_DOCS";
          font-size: 7.5pt; color: #888;
          padding-top: 0.3cm;
          border-top: 2pt solid #1d4ed8;
        }
      }
      /* Cover page — no headers/footers/liners */
      @page :first {
        @top-left    { content: ""; border: none; padding: 0; width: 100%; }
        @top-center  { content: ""; width: 0; }
        @top-right   { content: ""; width: 0; }
        @bottom-left   { content: ""; border: none; padding: 0; }
        @bottom-center { content: ""; border: none; padding: 0; }
        @bottom-right  { content: ""; border: none; padding: 0; }
      }

      /* Cover page — centered horizontally */
      #pub-cover-page {
        display: block !important; page-break-after: always;
        min-height: 90vh; position: relative;
        text-align: center;
        background-size: contain; background-repeat: no-repeat;
        background-position: center 15%;
      }
      /* Faded webcard background overlay */
      #pub-cover-page.has-webcard-bg::before {
        content: ''; position: absolute; inset: 0;
        background: rgba(255,255,255,0.82);
        z-index: 0;
      }
      #pub-cover-page.has-webcard-bg .cover-body { position: relative; z-index: 1; }
      .cover-body { max-width: 18cm; margin: 0 auto; padding-top: 30vh; }
      .cover-title { font-size: 28pt; font-weight: 700; color: #111; line-height: 1.2; margin-bottom: 0.7cm; }
      .cover-desc { font-size: 12pt; color: #333; line-height: 1.55; margin-bottom: 1cm; font-style: italic; }
      .cover-rule { border: none; border-top: 1.5pt solid #444; margin: 0 auto 0.8cm; width: 6cm; }
      .cover-meta { font-size: 10pt; color: #444; line-height: 2; }
      .cover-gen-line { font-size: 8.5pt; color: #666; font-family: monospace; margin-top: 0.2cm; }

      /* Corporate color overrides — clean document, not web theme */
      :root, html, html[data-theme] {
        --bg: #ffffff !important; --fg: #111111 !important;
        --accent: #1d4ed8 !important; --muted: #555555 !important;
        --border: #cccccc !important; --code-bg: #f5f5f5 !important;
      }
      body { background: #fff !important; color: #111 !important; font-size: 10pt; line-height: 1.55; }

      /* Typography */
      h1 { font-size: 18pt; color: #1d4ed8 !important; }
      h2 { font-size: 14pt; color: #111 !important; border-bottom: 1px solid #ccc !important; break-after: avoid; page-break-after: avoid; }
      h3 { font-size: 12pt; color: #1d4ed8 !important; break-after: avoid; page-break-after: avoid; }
      h4 { font-size: 10pt; break-after: avoid; page-break-after: avoid; }
      a { color: #1d4ed8 !important; }
      pre { font-size: 8pt; white-space: pre-wrap; word-break: break-all; break-inside: avoid; page-break-inside: avoid;

    // ===== Theme management =====
    (function initTheme() {
      var select = document.getElementById('themeSelect');
      var saved = localStorage.getItem('kdocs-theme') || 'auto';
      select.value = saved;
      if (saved !== 'auto') document.documentElement.setAttribute('data-theme', saved);

      var themeChannel = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('kdocs-theme-sync') : null;
      select.addEventListener('change', function() {
        var val = this.value;
        localStorage.setItem('kdocs-theme', val);
        if (val === 'auto') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', val);
        // Broadcast to iframes (I5, etc.)
        if (themeChannel) themeChannel.postMessage(val);
        // Sync srcdoc iframes directly (BroadcastChannel can't reach null-origin srcdoc)
        (function syncIframes(doc) {
          doc.querySelectorAll('iframe').forEach(function(f) {
            try {
              var d = f.contentDocument;
              if (d && d.documentElement) {
                if (val === 'auto') d.documentElement.removeAttribute('data-theme');
                else d.documentElement.setAttribute('data-theme', val);
                syncIframes(d);
              }
            } catch(e) {}
          });
        })(document);
        // Re-render mermaid for new theme
        renderMermaidBlocks();
        // Update live webcard mindmap theme
        if (window._webcardMind && window._webcardGetTheme) {
          window._webcardMind.changeTheme(window._webcardGetTheme());
        }
      });
    })();

    // ===== Orientation =====
    // BroadcastChannel works across all same-origin iframes regardless of nesting
    var orientChannel = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('kdocs-orient') : null;
    document.querySelectorAll('input[name="orient"]').forEach(function(r) {
      r.addEventListener('change', function() {
        var isLandscape = this.value === 'landscape';
        document.body.classList.toggle('landscape', isLandscape);
        localStorage.setItem('kdocs-landscape', isLandscape ? '1' : '0');
        if (orientChannel) orientChannel.postMessage({ landscape: isLandscape });
      });
    });
    // Embed pages: read current orientation from localStorage on load, then listen for changes
    if (IS_EMBED) {
      var savedOrient = localStorage.getItem('kdocs-landscape');
      if (savedOrient === '1') document.body.classList.add('landscape');
      if (orientChannel) {
        orientChannel.onmessage = function(e) {
          document.body.classList.toggle('landscape', e.data.landscape);
        };
      }
    }

    // ===== PDF export with cover page + page size + running headers =====
    var PAGE_SIZES = { letter: '8.5in 11in', legal: '8.5in 14in' };
    var currentMeta = {};

    function printAs(format) {
      var size = PAGE_SIZES[format] || PAGE_SIZES.letter;
      var orientRadio = document.querySelector('input[name="orient"]:checked');
      var orient = orientRadio ? orientRadio.value : 'portrait';
      if (orient === 'landscape') size += ' landscape';

      var now = new Date();
      var ts = now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0') + ' ' +
        String(now.getHours()).padStart(2, '0') + ':' +
        String(now.getMinutes()).padStart(2, '0');

      // Update cover page
      document.getElementById('coverGenDate').textContent = ts;

      // Build header/footer content from current meta
      var pubTitle = currentMeta.header_title || currentMeta.title || 'K_DOCS';
      var pubVersion = currentMeta.pub_version || currentMeta.version || '';
      var pubId = currentMeta.pub_id || '';
      var footerLeft = 'Generated: ' + ts;
      if (pubVersion) footerLeft += ' \\B7  ' + pubVersion;

      // Inject dynamic print styles — running header + footer + size
      document.getElementById('printSizeStyle').textContent =
        '@page { size: ' + size + '; }\n' +
        '@page {\n' +
        '  @top-left {\n' +
        '    content: "' + pubTitle.replace(/"/g, '\\"') + '";\n' +
        '    width: 100%; font-size: 7.5pt; color: #888;\n' +
        '    vertical-align: bottom; padding-bottom: 0.3cm;\n' +
        '    border-bottom: 2pt solid #1d4ed8;\n' +
        '  }\n' +
        '  @top-center { content: ""; width: 0; }\n' +
        '  @top-right  { content: ""; width: 0; }\n' +
        '  @bottom-left   { content: "' + footerLeft + '"; font-size: 7.5pt; color: #888; padding-top: 0.3cm; border-top: 2pt solid #1d4ed8; }\n' +
        '  @bottom-center { content: counter(page) " / " counter(pages); font-size: 7.5pt; color: #888; padding-top: 0.3cm; border-top: 2pt solid #1d4ed8; }\n' +
        '  @bottom-right  { content: "K_DOCS"; font-size: 7.5pt; color: #888; padding-top: 0.3cm; border-top: 2pt solid #1d4ed8; }\n' +
        '}\n' +
        '@page :first {\n' +
        '  @top-left    { content: ""; border: none; padding: 0; width: 100%; }\n' +
        '  @top-center  { content: ""; width: 0; }\n' +
        '  @top-right   { content: ""; width: 0; }\n' +
        '  @bottom-left   { content: ""; border: none; padding: 0; }\n' +
        '  @bottom-center { content: ""; border: none; padding: 0; }\n' +
        '  @bottom-right  { content: ""; border: none; padding: 0; }\n' +
        '}';

      // Smart TOC page break
      var toc = document.querySelector('.toc');
      var h2First = document.querySelector('#content h2');
      if (toc && h2First) {
        var halfPagePx = (format === 'legal') ? 585 : 441;
        var needsOwnPage = toc.getBoundingClientRect().height > halfPagePx;
        h2First.style.pageBreakBefore = needsOwnPage ? 'always' : 'auto';
        h2First.style.breakBefore = needsOwnPage ? 'page' : 'auto';
        window.addEventListener('afterprint', function() {
          h2First.style.pageBreakBefore = '';
          h2First.style.breakBefore = '';
        }, { once: true });
      }

      // Set PDF filename: PUB_ID - Title - VER.pdf
      var origTitle = document.title;
      var cleanTitle = (currentMeta.title || 'K_DOCS')
        .replace(/[\u2014\u2013]/g, ' - ')
        .replace(/[<>:"/\\|?*#]/g, '')
        .trim();

    // ===== Front matter parser =====
    function parseFrontMatter(text) {
      var match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      var meta = {};
      match[1].split('\n').forEach(function(line) {
        var m = line.match(/^(\w[\w_-]*)\s*:\s*(.+)$/);
        if (m) {
          var val = m[2].trim();
          if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
          meta[m[1]] = val;
        }
      });
      return { meta: meta, body: match[2] };
    }

    // ===== Liquid template resolver =====
    // Resolves Jekyll/Liquid syntax so production markdown renders in our static viewer.
    // Auto-detect baseurl from deployment path (works on /K_DOCS/, /knowledge/, localhost, etc.)
    var VIEWER_PATH = window.location.pathname.replace(/\/index\.html.*$/, '').replace(/\/$/, '') || '';
    // Production baseurl for resolving Liquid tags in imported markdown
    var PRODUCTION_BASEURL = '/knowledge';
    var SITE = {
      url: window.location.origin,
      baseurl: VIEWER_PATH,
      production_baseurl: PRODUCTION_BASEURL,
      github_repo: 'packetqc/knowledge',
      github: { repository_url: 'https://github.com/packetqc/knowledge' }
    };

    function resolveLiquid(body, meta) {
      // {{ 'path' | relative_url }} or {{ "path" | relative_url }} → baseurl + path
      body = body.replace(/\{\{\s*(['"])([^'"]*)\1\s*\|\s*relative_url\s*\}\}/g, function(_, q, p) {
        return SITE.baseurl + p;
      });
      // {{ 'path' | absolute_url }} or {{ "path" | absolute_url }} → url + baseurl + path
      body = body.replace(/\{\{\s*(['"])([^'"]*)\1\s*\|\s*absolute_url\s*\}\}/g, function(_, q, p) {
        return SITE.url + SITE.baseurl + p;
      });
      // {{ page.X | absolute_url }}
      body = body.replace(/\{\{\s*page\.(\w+)\s*\|\s*absolute_url\s*\}\}/g, function(_, key) {
        return SITE.url + SITE.baseurl + (meta[key] || '');
      });
      // {{ page.X }}
      body = body.replace(/\{\{\s*page\.(\w+)\s*\}\}/g, function(_, key) {
        return meta[key] || '';
      });
      // {{ site.X.Y }}
      body = body.replace(/\{\{\s*site\.(\w+)\.(\w+)\s*\}\}/g, function(_, a, b) {
        return (SITE[a] && SITE[a][b]) || '';
      });
      // {{ site.X | default: 'val' }}
      body = body.replace(/\{\{\s*site\.(\w+)\s*\|\s*default:\s*'([^']+)'\s*\}\}/g, function(_, key, def) {
        return SITE[key] || def;
      });
      // {{ site.X }}
      body = body.replace(/\{\{\s*site\.(\w+)\s*\}\}/g, function(_, key) {
        return SITE[key] || '';
      });
      // {{ "{{" }} — escaped double braces
      body = body.replace(/\{\{\s*"\{\{"\s*\}\}/g, '{{');
      // {% include ... %} — strip (can't resolve includes)
      body = body.replace(/\{%[^%]*%\}/g, '');
      return body;
    }

        backUrl = SITE.baseurl + '/' + summaryPath;

      // Version tag
      var versionHtml = '';
      if (meta.pub_version) {

        String(now.getMinutes()).padStart(2, '0');
      var genLabel = (meta.lang === 'fr') ? 'Généré' : 'Generated';

      // Collapsible metadata content — production format with labeled rows
      var detailsHtml = '';

      if (meta.pub_version) pubParts.push(escapeHtml(meta.pub_version));
      if (meta.pub_date || meta.date) pubParts.push(escapeHtml(meta.pub_date || meta.date));

      }
      // Row 2: Generated: timestamp
      detailsHtml += '<div class="chrome-detail-row"><span class="chrome-detail-label">' + genLabel + ':</span> ' + genDate + '</div>';
      // Row 3: Authors (from pub_meta or default — full names)
      var authors = '';

      }
      if (!authors) authors = 'Martin Paquet & Claude (Anthropic, Claude Opus 4.6)';
      var authLabel = (meta.lang === 'fr') ? 'Auteurs' : 'Authors';

      return { actualUrl: actualUrl, backUrl: backUrl, backLabel: backLabel, versionHtml: versionHtml, detailsHtml: detailsHtml };
    }

    // Depth-filter a mermaid mindmap using config (JS port of mindmap_filter.py)
    function filterMindmapCode(mermaidCode, config) {
      var lines = mermaidCode.split('\n');
      var headerLines = [], bodyLines = [], inHeader = true;
      for (var i = 0; i < lines.length; i++) {
        var s = lines[i].trim();
        if (inHeader && (s.indexOf('%%{') === 0 || s === 'mindmap' || s.indexOf('root(') !== -1)) {
          headerLines.push(lines[i]);
        } else { inHeader = false; bodyLines.push(lines[i]); }
      }
      var nodes = [];
      for (var i = 0; i < bodyLines.length; i++) {
        if (!bodyLines[i].trim()) continue;
        var content = bodyLines[i].replace(/^\s+/, '');
        var indent = bodyLines[i].length - content.length;
        nodes.push({ level: Math.floor(indent / 2), text: content, lineIdx: i });
      }
      if (!nodes.length) return headerLines.join('\n');
      var rootIndent = nodes[0].level;
      var omit = config.omit || [], overrides = config.overrides || {}, def = config.default_depth || 3;
      var out = [];
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i], parts = [], tgt = n.level;
        for (var j = i; j >= 0; j--) {
          if (nodes[j].level < tgt) { parts.unshift(nodes[j].text); tgt = nodes[j].level; }
          else if (j === i) parts.push(nodes[j].text);
        }
        var path = parts.join('/'), top = parts[0] || n.text;
        var depth = n.level - rootIndent + 1;
        var skip = false;
        for (var k = 0; k < omit.length; k++) { if (top === omit[k]) { skip = true; break; } }
        if (skip) continue;
        var max = def, best = 0;
        for (var op in overrides) {
          if ((path === op || path.indexOf(op + '/') === 0) && op.length > best) { best = op.length; max = overrides[op]; }
        }
        if (depth <= max) out.push(bodyLines[n.lineIdx]);
      }
      return headerLines.join('\n') + '\n' + out.join('\n');
    }

          if (!isDark && window.matchMedia) isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) return {

            palette:['#60a5fa','#818cf8','#a78bfa','#38bdf8','#22d3ee','#34d399','#fb923c','#f472b6','#c084fc','#facc15'],

          return {
            name:'Light',type:'light',
            palette:['#0055b3','#d48a3c','#6b21a8','#0369a1','#b45309','#047857','#be185d','#4338ca','#0e7490','#a16207'],
            cssVar:{'--bgcolor':'#faf6f1','--root-color':'#ffffff','--root-bgcolor':'#0055b3','--root-border-color':'#003d80','--main-color':'#1a1a2e','--main-bgcolor':'#eee8df','--color':'#5c5c78','--selected':'#0055b3','--root-radius':'30px','--main-radius':'8px'}
          };
        }
        // Mermaid to MindElixir converter
        function mermaidToME(code) {
          var lines=code.split('\n'),body=[],inH=true;
          for(var i=0;i<lines.length;i++){var s=lines[i].trim();if(inH&&(s.indexOf('%%{')===0||s==='mindmap'||s.indexOf('root(')!==-1))continue;inH=false;if(s)body.push({raw:lines[i],text:s});}
          var flat=[];
          for(var i=0;i<body.length;i++){var c=body[i].raw.replace(/^\s+/,''),ind=body[i].raw.length-c.length;var clean=c.replace(/^root\(\(/,'').replace(/\)\)$/,'').replace(/^\(\(/,'').replace(/\)\)$/,'').replace(/^\(/,'').replace(/\)$/,'').replace(/^\[/,'').replace(/\]$/,'').replace(/^\{/,'').replace(/\}$/,'');flat.push({level:Math.floor(ind/2),topic:clean,id:'wc-'+i});}
          function build(si,pl){var ch=[],i=si;while(i<flat.length){if(flat[i].level<=pl)break;if(flat[i].level===pl+1){var c={topic:flat[i].topic,id:flat[i].id,children:[]};var r=build(i+1,flat[i].level);c.children=r.ch;ch.push(c);i=r.ni;}else i++;}return{ch:ch,ni:i};}
          var root={topic:'knowledge',id:'wc-root',children:[]};
          if(flat.length){var r=build(0,flat[0].level-1);root.children=r.ch;}
          return{nodeData:root,direction:2};
        }
        Promise.all([
          fetch(RAW_BASE + 'mind/mind_memory.md').then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          }),
          fetch(RAW_BASE + 'conventions/depth_config.json').then(function(r) {
            return r.ok ? r.json() : { default_depth: 3, omit: ['architecture', 'constraints'], overrides: {} };
          }).catch(function() {
            return { default_depth: 3, omit: ['architecture', 'constraints'], overrides: {} };
          })
        ])
        .then(function(results) {
          var match = results[0].match(/```mermaid\s*\n([\s\S]*?)```/);
          if (!match) throw new Error('No mermaid block');
          var filtered = filterMindmapCode(match[1].trim(), results[1]);
          var data = mermaidToME(filtered);
          container.innerHTML = '';
          container.style.height = '300px';
          var mind = new MindElixir.default({
            el: container,
            direction: MindElixir.SIDE,
            editable: false,
            keypress: false,
            toolBar: false,
            theme: getMindTheme(),
            contextMenu: false,
            allowUndo: false
          });
          // Collapse branches beyond default depth
          function collapseDeep(node, depth) {
            if (node.children && node.children.length > 0) {
              if (depth >= 3) node.expanded = false;
              node.children.forEach(function(child) { collapseDeep(child, depth + 1); });
            }
          }
          collapseDeep(data.nodeData, 0);
          mind.init(data);
          window._webcardMind = mind;
          window._webcardGetTheme = getMindTheme;
          container.addEventListener('click', function(ev) {
            if (ev.target.tagName !== 'ME-EPD') return;
            if (!ev.ctrlKey && !ev.metaKey) return;
            var tpc = ev.target.previousSibling;
            if (!tpc || !tpc.nodeObj) return;
            (function resetAll(obj) {
              if (obj.children) obj.children.forEach(function(c) { c.expanded = false; resetAll(c); });
            })(tpc.nodeObj);
          }, true);
          setTimeout(function(){ mind.scaleFit(); }, 200);
        })
        .catch(function(err) {
          container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:1rem;">Live mindmap unavailable</p>';
        });
      }, 100);
      return '<div class="webcard-header" style="min-height:300px;padding:0;">' +
        '<div id="' + id + '" style="width:100%;height:100%;"><div class="loading" style="padding:2rem;text-align:center;">Loading live mindmap...</div></div>' +
        '</div>';
    }

    // ===== Markdown rendering =====
    function renderMarkdown(text, docPath) {
      var parsed = parseFrontMatter(text);
      var meta = parsed.meta;
      meta._docPath = docPath || '';
      var body = parsed.body;

      // Resolve Liquid templates before markdown parsing
      body = resolveLiquid(body, meta);

      // Remove kramdown IAL syntax like {: #pub-title}
      body = body.replace(/\{:\s*#[^}]+\}/g, '');
      // Remove {: .class} annotations
      body = body.replace(/\{:\s*\.[^}]+\}/g, '');
      // Remove manual TOC (EN: **Contents**, FR: **Table des matières**) followed by anchor-link bullet list
      body = body.replace(/\*\*(?:Contents|Table des matières)\*\*\s*\n(- \[.*?\]\(#.*?\)\s*\n)+/g, '');

      // Configure marked
      marked.setOptions({
        gfm: true,
        breaks: false,
        headerIds: true,
        mangle: false
      });

      // Custom renderer for mermaid code blocks
      var renderer = new marked.Renderer();
      var originalCode = renderer.code;

      renderer.code = function(obj) {
        // marked v15: code receives an object { text, lang, escaped }
        var code = typeof obj === 'string' ? obj : (obj.text || '');
        var lang = typeof obj === 'string' ? arguments[1] : (obj.lang || '');

        if (lang === 'mermaid') {
          return '<div class="mermaid">' + code + '</div>';
        }
        // For other languages
        return '<pre><code class="language-' + (lang || '') + '">' +
               escapeHtml(code) + '</code></pre>';
      };

      marked.setOptions({ renderer: renderer });

      var html = '';

      // Webcard: first element on standalone pages, hidden from export.
      // Only live webcards render visually; static og_image is meta-only (GIFs not yet generated).
      var webcardHtml = '';
      if (meta.live_webcard || meta.og_image) {
        webcardHtml = buildWebcardHeader(meta);
      }

      // Embed mode: chrome bar (no webcards in panels)
      if (IS_EMBED && (meta.title || meta.pub_meta)) {
        html += buildChromeBar(meta, 'embedChrome');
      }

      // Standalone mode: webcard FIRST, then doc-header
      if (!IS_EMBED) {
        // Webcard before doc-header
        html += webcardHtml;

        if (meta.title || meta.pub_meta) {
          var p = buildDocHeaderParts(meta);
          var dhId = 'docHeader';

          html += '<div class="doc-header">';
          html += '<div class="doc-header-bar">';
          html += '<span class="doc-header-toggle" id="' + dhId + 'Toggle" title="Show/hide details">&#9654;</span>';
          html += '<span class="dh-nav">' + (p.backUrl ? '<a href="' + p.backUrl + '">' + p.backLabel + '</a>' : '') + '</span>';
          html += '<span class="dh-actual">' + (p.actualUrl ? '<a href="' + p.actualUrl + '" target="_blank">Actual Page &#x2197;</a>' : '') + '</span>';
          html += '<span class="dh-version">' + p.versionHtml + '</span>';
          html += '</div>';
          html += '<div class="doc-header-details" id="' + dhId + 'Details">' + p.detailsHtml + '</div>';
          html += '</div>';
        }
      }

      // Set page title
      if (meta.title) document.title = meta.title + ' — K_DOCS';

      // Store meta globally for exports
      currentMeta = meta;

      // Inject og:image meta tag
      updateOgImage(meta);

      // Populate cover page + webcard as faded background
      var coverPage = document.getElementById('pub-cover-page');
      var coverTitle = document.getElementById('coverTitle');
      var coverDesc = document.getElementById('coverDesc');
      var coverMeta = document.getElementById('coverMeta');
      if (coverTitle) coverTitle.textContent = meta.title || '';
      if (coverDesc) coverDesc.textContent = meta.description || '';
      if (coverMeta) coverMeta.textContent = meta.pub_meta || '';
      // Set webcard image as faded cover background
      if (coverPage && meta.og_image) {
        var bgUrl = (SITE.baseurl || '') + meta.og_image;
        coverPage.style.backgroundImage = 'url(' + bgUrl + ')';
        coverPage.classList.add('has-webcard-bg');
      } else if (coverPage) {
        coverPage.style.backgroundImage = '';
        coverPage.classList.remove('has-webcard-bg');
      }

      // Render markdown
      html += marked.parse(body);

      return html;
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== TOC generation =====
    function generateTOC(container) {
      var headings = container.querySelectorAll('h2, h3');
      if (headings.length < 3) return; // Too few headings, skip TOC

      var toc = document.createElement('div');
      toc.className = 'toc';
      var tocLabel = (currentMeta.lang === 'fr') ? 'Table des matières' : 'Contents';
      toc.innerHTML = '<div class="toc-title">' + tocLabel + '</div>';
      var ul = document.createElement('ul');

      headings.forEach(function(h, i) {
        if (!h.id) h.id = 'heading-' + i;
        var li = document.createElement('li');
        if (h.tagName === 'H3') li.className = 'toc-h3';
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        ul.appendChild(li);
      });

      toc.appendChild(ul);

      // Two-column layout for long TOCs (8+ entries)
      if (headings.length >= 8) toc.classList.add('toc-twocol');

      // Insert after doc-header if present, else after first h1, else at top
      var docHeader = container.querySelector('.doc-header, .chrome-bar-meta');
      var h1 = container.querySelector('h1');
      var anchor = docHeader || h1;
      if (anchor && anchor.nextSibling) {
        anchor.parentNode.insertBefore(toc, anchor.nextSibling);
      } else if (anchor) {
        anchor.parentNode.appendChild(toc);
      } else {
        container.insertBefore(toc, container.firstChild);
      }
    }

    // ===== Mermaid rendering =====
    var mermaidInitialized = false;

    function renderMermaidBlocks() {
      var blocks = document.querySelectorAll('.mermaid');
      if (blocks.length === 0) return;

      // Determine theme based on current data-theme
      var theme = document.documentElement.getAttribute('data-theme') || 'auto';
      var mermaidTheme = 'default';
      if (theme === 'midnight' || theme === 'daltonism-dark') mermaidTheme = 'dark';

      // Store original source before re-rendering
      blocks.forEach(function(block) {
        if (!block.getAttribute('data-source')) {
          block.setAttribute('data-source', block.textContent);
        }
      });

      mermaid.initialize({
        startOnLoad: false,
        theme: mermaidTheme,
        securityLevel: 'loose',
        flowchart: { useMaxWidth: true, htmlLabels: true },
        mindmap: { useMaxWidth: true }
      });

      blocks.forEach(function(block, i) {
        var source = block.getAttribute('data-source');
        if (!source) return;
        block.innerHTML = source; // Reset to source
        block.removeAttribute('data-processed');
      });

      // Use mermaid.run() for v11
      mermaid.run({ nodes: blocks }).catch(function(err) {
        console.warn('Mermaid render error:', err);
      });
    }

    // ===== Internal link interceptor =====
    // Maps both viewer URLs and production URLs to viewer doc entries
    function resolveInternalPath(href) {
      var path = null;
      var lang = 'en';

      // Try viewer baseurl first, then production baseurl as fallback
      var prefixes = [SITE.baseurl + '/'];
      if (SITE.production_baseurl && SITE.production_baseurl !== SITE.baseurl) {
        prefixes.push(SITE.production_baseurl + '/');
      }
      for (var pi = 0; pi < prefixes.length; pi++) {
        var prefix = prefixes[pi];
        if (href.indexOf(prefix) === 0) {
          path = href.substring(prefix.length); break;
        } else if (href.indexOf(SITE.url + prefix) === 0) {
          path = href.substring((SITE.url + prefix).length); break;
        }
      }
      if (path === null) return null;

      // Detect FR prefix
      if (path.indexOf('fr/') === 0) {
        lang = 'fr';
        path = path.substring(3); // strip 'fr/'
      }

      // Strip trailing slash and hash
      path = path.replace(/\/$/, '').replace(/#.*$/, '');

      // Root path maps to index.md
      if (path === '') path = 'index.md';

      // Try matching against DOCS entries
      for (var i = 0; i < DOCS.length; i++) {
        var docPath = DOCS[i].path.replace(/\/$/, '').replace(/(^|\/)index\.md$/, '');
        var candidate = path.replace(/(^|\/)index\.md$/, '');
        if (candidate === docPath || candidate + '/index.md' === DOCS[i].path || candidate === DOCS[i].path) {
          return { index: i, lang: lang };
        }
      }
      return null;
    }

    function interceptInternalLinks(container) {
      container.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href) return;

        // Handle anchor links (scroll within page)
        if (href.charAt(0) === '#') return;

        // External links → open in new browser tab (they can't load in iframes)
        if (/^https?:\/\//.test(href) && href.indexOf(window.location.origin) !== 0) {
          e.preventDefault();
          window.open(href, '_blank', 'noopener');
          return;
        }

        var match = resolveInternalPath(href);
        if (match) {
          e.preventDefault();

          // Right-panel routing: when embed in content-frame, route interface links elsewhere
          if (IS_EMBED && window.name === 'content-frame') {
            var doc = DOCS[match.index];
            if (doc.group === 'Interfaces') {
              // Main Navigator → reload full page
              if (doc.path.indexOf('main-navigator') !== -1) {
                window.top.location.reload();
                return;
              }
              // Other interfaces → route to center-frame, keep right panel unchanged
              try {
                var centerFrame = window.parent.document.querySelector('iframe[name="center-frame"]');
                if (centerFrame) {
                  var embedUrl = window.location.pathname.replace(/[^/]*$/, '') +
                    'index.html?doc=' + encodeURIComponent(doc.path) + '&embed' +
                    (match.lang === 'fr' ? '&lang=fr' : '');
                  centerFrame.src = embedUrl;
                  return;
                }
              } catch(ex) {}
            }
          }

          document.getElementById('docSelect').value = match.index;
          loadWithLang(match.index, match.lang);
        }
      });
    }

    // Rewrite internal link hrefs so printed PDF/DOCX contains correct URLs
    function rewriteContentLinks(container) {
      var links = container.querySelectorAll('a[href]');
      var viewerBase = SITE.url + (SITE.baseurl || '') + '/index.html';
      for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (!href || href.charAt(0) === '#') continue;
        var match = resolveInternalPath(href);
        if (match) {
          var doc = DOCS[match.index];
          var docPath = (match.lang === 'fr' && doc.path_fr) ? doc.path_fr : doc.path;
          // Build viewer URL: site/index.html?doc=<path> (works on GitHub Pages without Jekyll)
          var url = viewerBase + '?doc=' + encodeURIComponent(docPath);
          if (match.lang === 'fr') url += '&lang=fr';
          links[i].setAttribute('href', url);
        }
      }
    }

    // ===== Interface renderer =====
    // For page_type: interface — renders directly with collapsible chrome bar.
    // Interface content fills viewport via iframe (document.write, same-origin) below the chrome bar.
    function renderInterface(container, meta, body) {
      if (meta.title) document.title = meta.title + ' — K_DOCS';
      currentMeta = meta;


      // Extract content between {::nomarkdown} and {:/nomarkdown}
      var rawMatch = body.match(/\{::nomarkdown\}([\s\S]*?)\{:\/nomarkdown\}/);
      if (!rawMatch) {
        var resolved = resolveLiquid(body, meta);
        container.innerHTML = marked.parse(resolved);
        generateTOC(container);
        return;
      }

      var rawHtml = rawMatch[1];
      rawHtml = resolveLiquid(rawHtml, meta);

      // Theme
      var theme = localStorage.getItem('kdocs-theme') || 'auto';
      var themeAttr = (theme && theme !== 'auto') ? ' data-theme="' + theme + '"' : '';

      // Base URL for absolute paths (needed because interface runs in Blob URL context)
      var viewerOrigin = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

      // Rewrite production URLs in static HTML
      function rewriteUrl(url, forEmbed) {
        if (url.charAt(0) === '#' || url.indexOf('javascript:') === 0) return url;
        var m = resolveInternalPath(url);
        if (m) {
          var d = DOCS[m.index];
          var base = viewerOrigin + 'index.html?doc=' + encodeURIComponent(d.path);
          if (forEmbed !== false) base += '&embed';
          if (m.lang === 'fr') base += '&lang=fr';
          return base;
        }
        return url;
      }

      rawHtml = rawHtml.replace(/(src=["'])([^"']*?)(["'])/g, function(_, pre, url, post) {
        return pre + rewriteUrl(url) + post;
      });
      rawHtml = rawHtml.replace(/(href=["'])([^"']*?)(["'])/g, function(_, pre, url, post) {
        return pre + rewriteUrl(url) + post;
      });

      // URL rewriter for dynamically created links inside interface JS
      var jsRewriter = '\n<script>\n' +
        'var VIEWER_ORIGIN = ' + JSON.stringify(viewerOrigin) + ';\n' +
        'var VIEWER_DOCS = ' + JSON.stringify(DOCS.map(function(d) { return { path: d.path, path_fr: d.path_fr || null }; })) + ';\n' +
        'var VIEWER_BASEURL = ' + JSON.stringify(SITE.baseurl) + ';\n' +
        'var VIEWER_PROD_BASEURL = ' + JSON.stringify(SITE.production_baseurl) + ';\n' +
        'function viewerRewriteUrl(url, forEmbed) {\n' +
        '  var prefixes = [VIEWER_BASEURL + "/"];\n' +
        '  if (VIEWER_PROD_BASEURL && VIEWER_PROD_BASEURL !== VIEWER_BASEURL) prefixes.push(VIEWER_PROD_BASEURL + "/");\n' +
        '  var path = null, lang = "en";\n' +
        '  for (var pi = 0; pi < prefixes.length; pi++) {\n' +
        '    if (url.indexOf(prefixes[pi]) === 0) { path = url.substring(prefixes[pi].length); break; }\n' +
        '  }\n' +
        '  if (path === null) return url;\n' +
        '  if (path.indexOf("fr/") === 0) { lang = "fr"; path = path.substring(3); }\n' +
        '  path = path.replace(/\\/$/, "").replace(/#.*$/, "");\n' +
        '  if (path === "") path = "index.md";\n' +
        '  for (var i = 0; i < VIEWER_DOCS.length; i++) {\n' +
        '    var dp = VIEWER_DOCS[i].path.replace(/\\/$/, "").replace(/(^|\\/)index\\.md$/, "");\n' +
        '    var c = path.replace(/(^|\\/)index\\.md$/, "");\n' +
        '    if (c === dp || c + "/index.md" === VIEWER_DOCS[i].path || c === VIEWER_DOCS[i].path) {\n' +
        '      var u = VIEWER_ORIGIN + "index.html?doc=" + encodeURIComponent(VIEWER_DOCS[i].path);\n' +
        '      if (forEmbed !== false) u += "&embed";\n' +
        '      if (lang === "fr") u += "&lang=fr";\n' +
        '      return u;\n' +
        '    }\n' +
        '  }\n' +
        '  return url;\n' +
        '}\n' +
        '</' + 'script>\n';

      // Post-render: rewrite iframes and intercept all link clicks
      var jsPostRewrite = '\n<script>\n' +
        'setTimeout(function() {\n' +
        '  /* Rewrite iframe srcs */\n' +
        '  document.querySelectorAll("iframe").forEach(function(f) {\n' +
        '    var s = f.getAttribute("src"); if (s) {\n' +
        '      var nw = viewerRewriteUrl(s); if (nw !== s) f.src = nw;\n' +
        '    }\n' +
        '  });\n' +
        '  /* Intercept ALL link clicks in the nav panel */\n' +
        '  var panel = document.getElementById("left-panel");\n' +
        '  if (panel) panel.addEventListener("click", function(e) {\n' +
        '    var a = e.target.closest("a");\n' +
        '    if (!a) return;\n' +
        '    var href = a.getAttribute("href");\n' +
        '    if (!href) return;\n' +
        '    var rewritten = (a.target === "_top") ? viewerRewriteUrl(href, false) : viewerRewriteUrl(href);\n' +
        '    if (rewritten === href) return;\n' +
        '    e.preventDefault();\n' +
        '    if (a.target === "_top") {\n' +
        '      window.top.location.href = rewritten;\n' +
        '    } else {\n' +
        '      var frame = document.querySelector(\'iframe[name="\' + a.target + \'"]\');\n' +
        '      if (frame) frame.src = rewritten;\n' +
        '    }\n' +
        '  });\n' +
        '}, 50);\n' +
        '</' + 'script>\n';

      // Build standalone HTML page for iframe
      var fullPage = '<!DOCTYPE html>\n<html lang="en"' + themeAttr + '>\n<head>\n' +
        '<meta charset="utf-8">\n' +
        '<meta name="viewport" content="width=device-width, initial-scale=1">\n' +
        '<title>' + escapeHtml(meta.title || 'Interface') + '</title>\n' +
        '<style>\n' +
        '  :root { --bg:#faf6f1;--fg:#1a1a2e;--accent:#0055b3;--muted:#5c5c78;--border:#d48a3c;--code-bg:#eee8df;--col-alt:rgba(0,85,179,0.05); }\n' +
        '  @media(prefers-color-scheme:dark){html:not([data-theme]),html[data-theme="auto"]{--bg:#1a1a2e;--fg:#e8e4f0;--accent:#5599dd;--muted:#9494aa;--border:#cc8833;--code-bg:#28283e;--col-alt:rgba(85,153,221,0.07);}}\n' +
        '  html[data-theme="cayman"]{--bg:#eff6ff;--fg:#0f172a;--accent:#1d4ed8;--muted:#475569;--border:#93c5fd;--code-bg:#dbeafe;--col-alt:rgba(29,78,216,0.05);}\n' +
        '  html[data-theme="midnight"]{--bg:#0f172a;--fg:#e2e8f0;--accent:#60a5fa;--muted:#94a3b8;--border:#334155;--code-bg:#1e293b;--col-alt:rgba(96,165,250,0.07);}\n' +
        '  html[data-theme="daltonism-light"]{--bg:#faf6f1;--fg:#1a1a2e;--accent:#0055b3;--muted:#5c5c78;--border:#d48a3c;--code-bg:#eee8df;--col-alt:rgba(0,85,179,0.05);}\n' +
        '  html[data-theme="daltonism-dark"]{--bg:#1a1a2e;--fg:#e8e4f0;--accent:#5599dd;--muted:#9494aa;--border:#cc8833;--code-bg:#28283e;--col-alt:rgba(85,153,221,0.07);}\n' +
        '  * { box-sizing:border-box; margin:0; padding:0; }\n' +
        '  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }\n' +
        '</style>\n' +
        '</head>\n<body>\n' +
        '<div class="container">\n' +
        jsRewriter +
        rawHtml +
        jsPostRewrite +
        '</div>\n</body>\n</html>';

      // --- Enter interface mode ---
      // Keep both toolbars (top: doc selector + lang, bottom: layout + export)
      var cont = document.querySelector('.container');
      cont.style.padding = '0';
      cont.style.maxWidth = '100%';

      // Interfaces are always landscape by default
      document.body.classList.add('landscape');
      localStorage.setItem('kdocs-landscape', '1');
      var landscapeRadio = document.querySelector('input[name="orient"][value="landscape"]');
      if (landscapeRadio) landscapeRadio.checked = true;

      // Chrome bar with "Actual Page" + collapsible metadata
      var chromeHtml = buildChromeBar(meta, 'ifaceChrome') +
        '<iframe id="ifaceFrame"></iframe>';

      container.innerHTML = chromeHtml;
      container.dataset.interfaceMode = '1';
      document.body.classList.add('interface-mode');

      // Write HTML directly into iframe via srcdoc (same-origin, enables iframe navigation)
      var ifaceFrame = document.getElementById('ifaceFrame');
      ifaceFrame.srcdoc = fullPage;

      // Init chrome toggle
      initChromeToggle('ifaceChrome', 'kdocs-ifaceChrome');

      window.scrollTo(0, 0);
    }

    // Restore viewer chrome when leaving interface mode
    function exitInterfaceMode() {
      var content = document.getElementById('content');
      if (content && content.dataset.interfaceMode === '1') {
        delete content.dataset.interfaceMode;
        document.body.classList.remove('interface-mode');
        document.querySelector('.toolbar-bottom').style.display = '';
        var cont = document.querySelector('.container');
        cont.style.padding = '';
        cont.style.maxWidth = '';
        document.body.classList.remove('landscape');
        var portraitRadio = document.querySelector('input[name="orient"][value="portrait"]');
        if (portraitRadio) portraitRadio.checked = true;
      }
    }

    // ===== Document loader =====
    function loadDocument(path) {
      exitInterfaceMode();
      var content = document.getElementById('content');
      content.className = 'loading';
      content.textContent = 'Loading document...';

      fetch(path)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(text) {
          content.className = '';
          var parsed = parseFrontMatter(text);

          // Interface page type — inject raw HTML directly
          if (parsed.meta.page_type === 'interface') {
            parsed.meta._docPath = path || '';
            renderInterface(content, parsed.meta, parsed.body);
            return;
          }

          content.innerHTML = renderMarkdown(text, path);
          if (IS_EMBED) initChromeToggle('embedChrome', 'kdocs-embedChrome');
          if (!IS_EMBED) initChromeToggle('docHeader', 'kdocs-docHeader', 'Details');
          generateTOC(content);

          // Render mermaid after DOM is ready
          requestAnimationFrame(function() {
            renderMermaidBlocks();
          });

          // Intercept internal links + rewrite hrefs for print/export
          interceptInternalLinks(content);
          rewriteContentLinks(content);

          // Scroll to top
          window.scrollTo(0, 0);
        })
        .catch(function(err) {
          content.className = '';
          content.innerHTML = '<h1>Error loading document</h1><p>' + err.message + '</p>' +
            '<p>Path: <code>' + path + '</code></p>' +
            '<p>Make sure you are serving this file via a local HTTP server (e.g. <code>python3 -m http.server 8000</code>).</p>';
        });
    }
  </script>
