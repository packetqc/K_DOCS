<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
    </linearGradient>
    <linearGradient id="masterFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Accent bars top + bottom -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)"/>

  <!-- Title -->
  <text x="640" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="-1">knowledge</text>

  <!-- Version badge -->
  <rect x="800" y="38" width="56" height="28" rx="6" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text x="828" y="57" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#2563eb" text-anchor="middle">v11</text>

  <!-- Subtitle -->
  <text x="640" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569" text-anchor="middle">Distributed Minds — AI Knowledge Network</text>

  <!-- Sunglasses icon (small, centered) -->
  <g transform="translate(540, 52)" opacity="0.8">
    <rect x="-28" y="-10" width="24" height="16" rx="4" fill="url(#lens)" stroke="#2563eb" stroke-width="1"/>
    <rect x="6" y="-10" width="24" height="16" rx="4" fill="url(#lens)" stroke="#7c3aed" stroke-width="1"/>
    <path d="M-4,-4 Q1,-8 6,-4" fill="none" stroke="#64748b" stroke-width="1.2"/>
    <line x1="-28" y1="-4" x2="-38" y2="-8" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="-4" x2="40" y2="-8" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- ============================================ -->
  <!-- NETWORK DIAGRAM -->
  <!-- ============================================ -->

  <!-- Master mind (center) -->
  <rect x="460" y="140" width="360" height="120" rx="16" fill="url(#masterFill)" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="178" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">Master Mind</text>
  <text x="640" y="202" font-family="ui-monospace, monospace" font-size="13" fill="#475569" text-anchor="middle">packetqc/knowledge</text>

  <!-- Knowledge layer badges inside master -->
  <g transform="translate(490, 222)">
    <rect x="0" y="0" width="70" height="22" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <text x="35" y="15" font-family="ui-monospace, monospace" font-size="10" fill="#2563eb" text-anchor="middle">patterns</text>
    <rect x="80" y="0" width="60" height="22" rx="4" fill="#dbeafe" stroke="#7c3aed" stroke-width="1"/>
    <text x="110" y="15" font-family="ui-monospace, monospace" font-size="10" fill="#7c3aed" text-anchor="middle">lessons</text>
    <rect x="150" y="0" width="56" height="22" rx="4" fill="#dbeafe" stroke="#0891b2" stroke-width="1"/>
    <text x="178" y="15" font-family="ui-monospace, monospace" font-size="10" fill="#0891b2" text-anchor="middle">minds</text>
    <rect x="216" y="0" width="86" height="22" rx="4" fill="#dbeafe" stroke="#475569" stroke-width="1"/>
    <text x="259" y="15" font-family="ui-monospace, monospace" font-size="10" fill="#475569" text-anchor="middle">methodology</text>
  </g>

  <!-- Satellite: STM32 (left) -->
  <rect x="80" y="340" width="240" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="372" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">STM32N6570-DK_SQLITE</text>
  <text x="200" y="396" font-family="ui-monospace, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">v0 · drift 11</text>
  <!-- Health dot -->
  <circle cx="100" y="355" r="5" fill="#ef4444"/>

  <!-- Satellite: MPLIB (center) -->
  <rect x="400" y="340" width="200" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="500" y="372" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">MPLIB</text>
  <text x="500" y="396" font-family="ui-monospace, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">v0 · drift 11</text>
  <circle cx="420" y="355" r="5" fill="#ef4444"/>

  <!-- Satellite: PQC (center-right) -->
  <rect x="680" y="340" width="200" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="780" y="372" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">PQC</text>
  <text x="780" y="396" font-family="ui-monospace, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">v0 · drift 11</text>
  <circle cx="700" y="355" r="5" fill="#ef4444"/>

  <!-- Satellite: knowledge self (right) -->
  <rect x="960" y="340" width="240" height="80" rx="12" fill="#f1f5f9" stroke="#2563eb" stroke-width="2"/>
  <text x="1080" y="372" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">knowledge (self)</text>
  <text x="1080" y="396" font-family="ui-monospace, monospace" font-size="12" fill="#2563eb" text-anchor="middle">v11 · drift 0</text>
  <circle cx="980" y="355" r="5" fill="#22c55e"/>

  <!-- Push arrows (master → satellites) -->
  <g stroke="#2563eb" stroke-width="1.5" fill="none">
    <line x1="520" y1="260" x2="220" y2="335" stroke-dasharray="none"/>
    <line x1="600" y1="260" x2="500" y2="335"/>
    <line x1="680" y1="260" x2="760" y2="335"/>
    <line x1="760" y1="260" x2="1060" y2="335"/>
  </g>
  <!-- Push arrowheads -->
  <polygon points="220,335 226,325 214,325" fill="#2563eb"/>
  <polygon points="500,335 506,325 494,325" fill="#2563eb"/>
  <polygon points="760,335 766,325 754,325" fill="#2563eb"/>
  <polygon points="1060,335 1066,325 1054,325" fill="#2563eb"/>

  <!-- Push label -->
  <text x="380" y="290" font-family="ui-monospace, monospace" font-size="11" fill="#2563eb" text-anchor="middle">push</text>

  <!-- Harvest arrows (satellites → master, dashed) -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="5,4">
    <line x1="240" y1="340" x2="540" y2="264"/>
    <line x1="500" y1="340" x2="600" y2="264"/>
    <line x1="760" y1="340" x2="680" y2="264"/>
    <line x1="1040" y1="340" x2="740" y2="264"/>
  </g>
  <!-- Harvest arrowheads -->
  <polygon points="540,264 534,274 546,274" fill="#7c3aed"/>
  <polygon points="600,264 594,274 606,274" fill="#7c3aed"/>
  <polygon points="680,264 674,274 686,274" fill="#7c3aed"/>
  <polygon points="740,264 734,274 746,274" fill="#7c3aed"/>

  <!-- Harvest label -->
  <text x="880" y="290" font-family="ui-monospace, monospace" font-size="11" fill="#7c3aed" text-anchor="middle">harvest</text>

  <!-- ============================================ -->
  <!-- BOTTOM: Promotion workflow + severity legend -->
  <!-- ============================================ -->

  <!-- Promotion workflow -->
  <g transform="translate(200, 480)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="start">Promotion:</text>

    <!-- Review -->
    <rect x="90" y="-16" width="88" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="134" y="3" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a" text-anchor="middle">🔍 review</text>

    <!-- Arrow -->
    <text x="190" y="3" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">→</text>

    <!-- Stage -->
    <rect x="202" y="-16" width="78" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="241" y="3" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a" text-anchor="middle">📦 stage</text>

    <!-- Arrow -->
    <text x="292" y="3" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">→</text>

    <!-- Promote -->
    <rect x="304" y="-16" width="96" height="28" rx="6" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.5"/>
    <text x="352" y="3" font-family="system-ui, sans-serif" font-size="12" fill="#2563eb" text-anchor="middle">✅ promote</text>

    <!-- Arrow -->
    <text x="412" y="3" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">→</text>

    <!-- Auto -->
    <rect x="424" y="-16" width="70" height="28" rx="6" fill="#f1f5f9" stroke="#0891b2" stroke-width="1"/>
    <text x="459" y="3" font-family="system-ui, sans-serif" font-size="12" fill="#0891b2" text-anchor="middle">🔄 auto</text>
  </g>

  <!-- Severity legend -->
  <g transform="translate(200, 530)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="start">Severity:</text>

    <circle cx="105" cy="-4" r="6" fill="#22c55e"/>
    <text x="118" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="start">current</text>

    <circle cx="195" cy="-4" r="6" fill="#eab308"/>
    <text x="208" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="start">minor</text>

    <circle cx="268" cy="-4" r="6" fill="#f97316"/>
    <text x="281" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="start">moderate</text>

    <circle cx="362" cy="-4" r="6" fill="#ef4444"/>
    <text x="375" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="start">critical</text>

    <circle cx="445" cy="-4" r="6" fill="#d1d5db" stroke="#94a3b8" stroke-width="0.5"/>
    <text x="458" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="start">inactive</text>
  </g>

  <!-- Bottom metrics -->
  <g transform="translate(710, 505)">
    <text x="0" y="0" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#2563eb">9</text>
    <text x="0" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">harvested</text>

    <text x="80" y="0" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#7c3aed">4</text>
    <text x="80" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">satellites</text>

    <text x="160" y="0" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#0891b2">11</text>
    <text x="160" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">evolution</text>

    <text x="240" y="0" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#0f172a">5</text>
    <text x="240" y="18" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">publications</text>
  </g>

  <!-- Author line -->
  <text x="640" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Martin Paquet &amp; Claude (Anthropic)  |  packetqc/knowledge</text>
</svg>
