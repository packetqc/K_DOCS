title: "Knowledge 2.0 — Interactive Intelligence Framework"
description: "AI Engineering Intelligence — structured session onboarding, command routing, methodology deduplication, and interactive working modes."
url: "https://packetqc.github.io"
baseurl: "/knowledge"

# GitHub Pages theme
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Knowledge system version
knowledge_version: "v2.0"
knowledge_version_suffix: ""

# Repository — used by layouts for raw content URLs (portable across repos)
github_repo: "packetqc/knowledge"

# SEO defaults
author: "Martin Paquet & Claude (Anthropic, Opus 4.6)"
locale: "en_US"

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "publications"
    values:
      layout: "publication"
  - scope:
      path: "fr/publications"
    values:
      layout: "publication"
  - scope:
      path: "interfaces"
    values:
      layout: "publication"

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
